<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureProofing · Candidate Evaluations</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.1.0/dist/tabler-icons.min.css">
<style>
:root{
  --tech-indigo:#4C1D95;--deep-violet:#7C3AED;--blue-purple:#6366F1;--electric-purple:#A855F7;
  --indigo-light:#818CF8;--lavender:#F8F4FF;--ink:#0B0614;--ink-soft:#3A3450;--muted:#6B6480;
  --line:#E6DEF7;--white:#fff;--ok:#16a34a;--mixed:#d97706;--flag:#dc2626;
  --grad:linear-gradient(90deg,var(--blue-purple),var(--electric-purple));
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--lavender);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
.hidden{display:none!important}

.topbar{background:var(--ink);color:#fff}
.topbar-inner{max-width:1240px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand{display:flex;align-items:center;gap:10px}
.brand-trail{display:flex;gap:3px}
.brand-trail i{width:5px;height:5px;background:var(--electric-purple);border-radius:1px;display:block}
.brand-trail i:nth-child(2){opacity:.6}.brand-trail i:nth-child(3){opacity:.3}
.brand-logo{font-weight:800;font-size:18px;letter-spacing:-.4px;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.topbar-right{display:flex;align-items:center;gap:14px;font-size:13px}
.topbar-track{color:#fff;font-weight:600}
.refresh{display:inline-flex;align-items:center;gap:7px;background:rgba(129,140,248,.14);color:var(--indigo-light);border:1px solid rgba(129,140,248,.3);font-weight:600;padding:7px 14px;border-radius:20px;font-size:13px}
.refresh:hover{background:rgba(129,140,248,.24)}
.refresh i{font-size:15px}
.refresh.spinning i{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.shell{max-width:1240px;margin:0 auto;display:flex;gap:0;min-height:calc(100vh - 60px)}
.sidebar{flex:0 0 300px;border-right:1px solid var(--line);padding:20px 12px;background:#FBFAFF}
.side-label{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--blue-purple);font-weight:700;margin:0 8px 12px}
.person{display:flex;align-items:center;gap:11px;padding:11px 10px;border-radius:11px;cursor:pointer;margin-bottom:3px;transition:background .15s;border:none;background:none;width:100%;text-align:left}
.person:hover{background:var(--lavender)}
.person.active{background:linear-gradient(90deg,#EEF2FF,#FBF5FF);border-left:3px solid var(--blue-purple);padding-left:7px;box-shadow:0 1px 3px rgba(99,102,241,.08)}
.av{width:34px;height:34px;border-radius:50%;background:#EEEDFE;color:var(--tech-indigo);display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:800;flex:0 0 auto}
.person.active .av{background:var(--grad);color:#fff}
.person .pinfo{min-width:0;flex:1}
.person .pname{font-size:13.5px;color:var(--ink-soft);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.person.active .pname{color:var(--tech-indigo);font-weight:700}
.person .psub{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-top:1px}
.dot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
.dot.proceed{background:var(--ok)}.dot.proceed_with_caution{background:var(--mixed)}.dot.reject{background:var(--flag)}.dot.none{background:var(--muted)}

.stage{flex:1;padding:26px 34px;min-width:0}
@media(max-width:820px){.shell{flex-direction:column}.sidebar{flex:auto;border-right:none;border-bottom:1px solid var(--line)}.stage{padding:22px 18px}}

.ctx{background:linear-gradient(135deg,#2a1958,var(--tech-indigo));color:#fff;border-radius:16px;padding:22px 24px;margin-bottom:22px;display:flex;justify-content:space-between;align-items:flex-start;gap:18px;flex-wrap:wrap}
.ctx .who{font-size:12px;color:var(--indigo-light);font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-bottom:5px}
.ctx .role{font-size:23px;font-weight:800;letter-spacing:-.4px}
.ctx .meta{font-size:13px;color:#E6DEF7;margin-top:8px;display:flex;gap:16px;flex-wrap:wrap}
.ctx .meta span{display:inline-flex;align-items:center;gap:5px}
.ctx-score{text-align:right}
.ctx-score .conf-lbl{font-size:13px;color:#E6DEF7;font-weight:700}
.ctx-score .lbl{font-size:11px;color:var(--indigo-light);text-transform:uppercase;letter-spacing:.6px;margin-top:6px}

.exec-card{background:linear-gradient(135deg,#FBF5FF,#EEF2FF);border:1px solid var(--line);border-radius:14px;padding:24px 26px;margin-bottom:24px}
.exec-label{font-size:10.5px;letter-spacing:1.3px;text-transform:uppercase;color:var(--blue-purple);font-weight:800;margin-bottom:10px}
.exec-text{font-size:15.5px;color:var(--ink-soft);font-weight:400;line-height:1.7}

.sec-title{font-size:11px;letter-spacing:1.3px;text-transform:uppercase;color:var(--blue-purple);font-weight:700;margin:0 0 11px;display:flex;align-items:center;justify-content:space-between}
.card{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-bottom:18px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
@media(max-width:940px){.grid3{grid-template-columns:1fr}}
.chart-empty{font-size:13.5px;color:var(--muted);padding:18px;text-align:center;background:var(--lavender);border-radius:10px}

/* Collapsed-by-default accordion sections (Summary, Scorecard, Flags, Timeline) */
details.accordion{background:var(--white);border:1px solid var(--line);border-radius:14px;margin-bottom:16px;overflow:hidden}
details.accordion>summary{list-style:none;cursor:pointer;padding:18px 22px;display:flex;align-items:center;gap:11px;font-size:11px;letter-spacing:1.1px;text-transform:uppercase;color:var(--blue-purple);font-weight:700}
details.accordion>summary::-webkit-details-marker{display:none}
details.accordion>summary .chev{display:inline-block;font-size:11px;color:var(--electric-purple);transition:transform .15s ease;flex:0 0 auto}
details.accordion[open]>summary .chev{transform:rotate(90deg)}
details.accordion>summary .acc-teaser{text-transform:none;letter-spacing:0;color:var(--muted);font-weight:600;font-size:12.5px;margin-left:auto;text-align:right}
details.accordion .acc-body{padding:20px 22px 24px}
details.accordion[open]>summary{border-bottom:1px solid var(--line)}

.sc-item{padding:14px 0;border-bottom:1px dashed var(--line)}
.sc-item:first-child{padding-top:0}
.sc-item:last-child{padding-bottom:0;border-bottom:none}
.el-row{display:flex;align-items:center;gap:14px}
.el-name{flex:0 0 160px;font-size:12.5px;font-weight:600;line-height:1.35}
.el-bar-track{flex:1;height:10px;background:var(--line);border-radius:6px;overflow:hidden}
.el-bar-fill{height:100%;background:var(--grad);border-radius:6px;width:0;transition:width .8s ease}
.el-bar-fill.low{background:linear-gradient(90deg,#f59e0b,#dc2626)}
.el-score{flex:0 0 30px;text-align:right;font-weight:800;font-size:14.5px;color:var(--tech-indigo)}
.el-conf{flex:0 0 60px;font-size:10.5px;font-weight:700;text-transform:uppercase;color:var(--muted);text-align:right}
.el-reason{font-size:12.5px;color:var(--muted);line-height:1.6;margin-top:8px;padding-left:2px}

.attrib{font-size:11px;color:var(--muted);margin-top:6px;font-style:italic}

.bullet-list{list-style:none}
.bullet-list li{font-size:13.5px;color:var(--ink-soft);line-height:1.55;padding:13px 0;border-bottom:1px dashed var(--line)}
.bullet-list li:first-child{padding-top:0}
.bullet-list li:last-child{border-bottom:none;padding-bottom:0}

.flaglist{list-style:none}
.flaglist li{font-size:13px;color:var(--ink-soft);line-height:1.55;padding:13px 0;border-bottom:1px dashed var(--line);display:flex;gap:10px;align-items:flex-start}
.flaglist li:first-child{padding-top:0}
.flaglist li:last-child{border-bottom:none;padding-bottom:0}
.flaglist li i{margin-top:2px;flex:0 0 auto}
.flaglist li .flag-body{min-width:0}
.flag-green i{color:var(--ok)}.flag-yellow i{color:var(--mixed)}.flag-red i{color:var(--flag)}

.timeline{list-style:none;position:relative}
.tl-item{display:flex;gap:14px;padding-bottom:18px;position:relative}
.tl-item:last-child{padding-bottom:0}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:11px;top:26px;bottom:0;width:2px;background:var(--line)}
.tl-dot{width:24px;height:24px;border-radius:50%;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;flex:0 0 auto;z-index:1}
.tl-body .tl-stage{font-size:13.5px;font-weight:700;color:var(--tech-indigo)}
.tl-body .tl-find{font-size:13px;color:var(--ink-soft);margin-top:3px}
.tl-body .tl-change{font-size:12px;color:var(--muted);margin-top:3px;font-style:italic}

.qlist{list-style:none}
.qlist li{font-size:13.5px;color:var(--ink-soft);padding:9px 0;border-bottom:1px dashed var(--line);display:flex;gap:9px}
.qlist li:last-child{border-bottom:none}
.qlist li i{color:var(--electric-purple);margin-top:2px;flex:0 0 auto}

.rec-final{border-radius:10px;padding:14px 18px;background:var(--lavender);border-left:3px solid var(--line)}
.rec-final.proceed{border-left-color:#86efac}
.rec-final.proceed_with_caution{border-left-color:var(--indigo-light)}
.rec-final.reject{border-left-color:#fca5a5}
.rec-final .rf-txt{font-size:13.5px;color:var(--ink-soft);line-height:1.5}
.rec-final .rf-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;color:var(--muted)}

.regen-btn{background:var(--blue-purple);color:#fff;border:none;border-radius:11px;padding:10px 18px;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px}
.regen-btn:hover{background:var(--deep-violet)}
.regen-btn:disabled{opacity:.6;cursor:default}

details.stage-raw{margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
details.stage-raw summary{font-size:12px;color:var(--blue-purple);cursor:pointer;font-weight:600}
details.stage-raw pre{font-size:11px;color:var(--ink-soft);background:var(--lavender);border-radius:8px;padding:12px;margin-top:8px;overflow-x:auto;white-space:pre-wrap}

.center-state{max-width:560px;margin:80px auto;text-align:center;padding:0 24px}
.center-state .ico{font-size:46px;color:var(--indigo-light);margin-bottom:14px}
.center-state h2{font-size:22px;font-weight:800;margin-bottom:8px}
.center-state p{color:var(--ink-soft);font-size:15px}
.spinner{width:42px;height:42px;border:4px solid var(--line);border-top-color:var(--blue-purple);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 18px}
.retry{margin-top:18px;background:var(--blue-purple);color:#fff;border:none;border-radius:11px;padding:11px 22px;font-size:14px;font-weight:600}
.retry:hover{background:var(--deep-violet)}
</style>
</head>
<body>

<div class="topbar"><div class="topbar-inner">
  <div class="brand"><span class="brand-trail"><i></i><i></i><i></i></span><span class="brand-logo">FutureProofing</span></div>
  <div class="topbar-right">
    <span class="topbar-track">Candidate Evaluations</span>
    <button class="refresh" id="refreshBtn" onclick="loadList()"><i class="ti ti-refresh"></i>Refresh</button>
  </div>
</div></div>

<div id="main"></div>

<script>
const API = '/api/candidate-summary';
let LIST = [], selectedId = null, DETAIL = null;

function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function initials(name){return (name||'?').split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();}
function fmtDate(d){if(!d)return '—';const t=new Date(d);if(isNaN(t))return '—';return t.toLocaleDateString('en-US',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function recLabel(r){return {proceed:'Proceed',proceed_with_caution:'Proceed — Partner with Senior Engineer',reject:'Not a Fit Right Now'}[r]||'No summary yet';}

// Competency keys come back from the engine as config keys (e.g. "agentic_coding"),
// not display labels — title-case them for the UI.
function titleCase(key){return String(key||'').replace(/[_-]+/g,' ').replace(/\b\w/g,c=>c.toUpperCase());}

function scorecardBars(scorecard){
  if(!scorecard||!scorecard.length) return '<div class="chart-empty">No scorecard generated yet.</div>';
  return scorecard.map(c=>{
    const p=Math.round((c.score/5)*100);
    return `<div class="sc-item">
      <div class="el-row">
        <div class="el-name">${esc(titleCase(c.competency))}</div>
        <div class="el-bar-track"><div class="el-bar-fill ${c.score<3?'low':''}" style="width:${p}%"></div></div>
        <div class="el-score">${c.score}/5</div>
        <div class="el-conf">${esc(c.confidence||'')}</div>
      </div>
      <div class="el-reason">${esc(c.reasoning||'')}<div class="attrib">— ${esc(c.evaluatorName||'')}${c.context?', '+esc(c.context):''}</div></div>
    </div>`;
  }).join('');
}

// Compact one-line teaser for the collapsed Scorecard summary row.
function scorecardTeaser(scorecard){
  if(!scorecard||!scorecard.length) return 'Not generated yet';
  return scorecard.map(c=>`${titleCase(c.competency)} ${c.score}/5`).join(' · ');
}

// items are {text, evaluatorName, context} objects (attributed).
function flagList(items, cls, icon){
  if(!items||!items.length) return '<div class="chart-empty">None noted.</div>';
  return `<ul class="flaglist">${items.map(f=>`<li class="${cls}"><i class="ti ${icon}"></i>
    <div class="flag-body">${esc(f.text)}<div class="attrib">— ${esc(f.evaluatorName||'')}${f.context?', '+esc(f.context):''}</div></div>
  </li>`).join('')}</ul>`;
}

// candidateSummaryBullets: {text, evaluatorName, context} objects (attributed).
function bulletList(items){
  if(!items||!items.length) return '<div class="chart-empty">No summary bullets generated yet.</div>';
  return `<ul class="bullet-list">${items.map(b=>`<li>${esc(b.text)}<div class="attrib">— ${esc(b.evaluatorName||'')}${b.context?', '+esc(b.context):''}</div></li>`).join('')}</ul>`;
}

function timeline(items){
  if(!items||!items.length) return '<div class="chart-empty">No stage history yet.</div>';
  return `<ul class="timeline">${items.map((t,i)=>`<li class="tl-item">
    <div class="tl-dot">${i+1}</div>
    <div class="tl-body">
      <div class="tl-stage">${esc(t.stage)}</div>
      <div class="tl-find">${esc(t.keyFindings)}</div>
      <div class="tl-change">${esc(t.whatChanged)}</div>
    </div>
  </li>`).join('')}</ul>`;
}

function questionList(items){
  if(!items||!items.length) return '<div class="chart-empty">No open questions — prior stages resolved everything they could.</div>';
  return `<ul class="qlist">${items.map(q=>`<li><i class="ti ti-help-circle"></i>${esc(q)}</li>`).join('')}</ul>`;
}

function stageEvaluationsCard(stageEvaluations){
  if(!stageEvaluations||!stageEvaluations.length) return '<div class="chart-empty">No per-stage evaluations generated yet.</div>';
  return stageEvaluations.map(ev=>`<details class="stage-raw">
    <summary>${esc(ev.stage_name||ev.stage_key)} · generated ${fmtDate(ev.created_at)} · ${esc(ev.prompt_version)}</summary>
    <pre>${esc(JSON.stringify(ev.output, null, 2))}</pre>
  </details>`).join('');
}

function renderList(){
  const main=document.getElementById('main');
  if(!LIST.length){
    main.innerHTML=`<div class="center-state"><div class="ico"><i class="ti ti-users"></i></div>
      <h2>No candidates tracked yet</h2>
      <p>Nobody has reached the "Chat with Jess" stage since this engine started polling.</p></div>`;
    return;
  }
  if(selectedId==null) selectedId=LIST[0].id;

  const items=LIST.map(c=>{
    const rec=c.recommendation||'none';
    return `<button class="person ${c.id===selectedId?'active':''}" onclick="pick(${c.id})">
      <span class="av">${esc(initials(c.name))}</span>
      <span class="pinfo">
        <span class="pname">${esc(c.name||'Unknown')}</span>
        <span class="psub"><span class="dot ${rec}"></span>${esc(c.currentStage||'—')}</span>
      </span>
    </button>`;
  }).join('');

  main.innerHTML=`<div class="shell">
    <nav class="sidebar">
      <div class="side-label">Candidates (${LIST.length})</div>
      ${items}
    </nav>
    <main class="stage" id="detailPane">
      <div class="center-state"><div class="spinner"></div><h2>Loading detail…</h2></div>
    </main>
  </div>`;

  loadDetail(selectedId);
}

function renderDetail(){
  const pane=document.getElementById('detailPane');
  if(!pane||!DETAIL) return;
  const c=DETAIL.candidate;
  const fs=DETAIL.finalSummary;
  const out=fs?fs.output:null;
  const rec=fs?fs.recommendation:'none';

  const execCard = out ? `<div class="exec-card">
      <div class="exec-label">Executive Summary</div>
      <div class="exec-text">${esc(out.executiveSummary)}</div>
    </div>` : `<div class="exec-card"><div class="exec-label">Executive Summary</div><div class="chart-empty">No Final Candidate Summary yet — it's generated once at least one stage evaluation exists.</div></div>`;

  const nGreen=(out?.greenFlags||[]).length, nYellow=(out?.yellowFlags||[]).length, nRed=(out?.redFlags||[]).length;
  const nStages=(out?.evidenceTimeline||[]).length;
  const nStability=(out?.employmentStabilityNotes||[]).length;

  pane.innerHTML = `
    <div class="ctx">
      <div>
        <div class="who">${esc(c.job_title||'')}</div>
        <div class="role">${esc(c.name||'Unknown')}</div>
        <div class="meta">
          <span><i class="ti ti-mail"></i> ${esc(c.email||'—')}</span>
          <span><i class="ti ti-map-pin"></i> ${esc(c.current_stage||'—')}</span>
          <span><i class="ti ti-clock"></i> Updated ${fmtDate(c.updated_at)}</span>
        </div>
      </div>
      <div class="ctx-score">
        <div class="conf-lbl">${fs?('Confidence: '+esc(fs.confidence||'—')):''}</div>
      </div>
    </div>

    ${execCard}

    <details class="accordion">
      <summary><span class="chev">▶</span> Summary <span class="acc-teaser">${(out?.candidateSummaryBullets||[]).length} points</span></summary>
      <div class="acc-body">${bulletList(out?out.candidateSummaryBullets:null)}</div>
    </details>

    <details class="accordion">
      <summary><span class="chev">▶</span> Scorecard <span class="acc-teaser">${esc(scorecardTeaser(out?out.scorecard:null))}</span></summary>
      <div class="acc-body">${scorecardBars(out?out.scorecard:null)}</div>
    </details>

    <details class="accordion">
      <summary><span class="chev">▶</span> Green Flags <span class="acc-teaser">${nGreen}</span></summary>
      <div class="acc-body">${flagList(out?out.greenFlags:null,'flag-green','ti-circle-check')}</div>
    </details>

    <details class="accordion">
      <summary><span class="chev">▶</span> Yellow Flags <span class="acc-teaser">${nYellow}</span></summary>
      <div class="acc-body">${flagList(out?out.yellowFlags:null,'flag-yellow','ti-alert-triangle')}</div>
    </details>

    <details class="accordion">
      <summary><span class="chev">▶</span> Red Flags <span class="acc-teaser">${nRed}</span></summary>
      <div class="acc-body">${flagList(out?out.redFlags:null,'flag-red','ti-flag-3')}</div>
    </details>

    <details class="accordion">
      <summary><span class="chev">▶</span> Job Tenure &amp; Stability <span class="acc-teaser">${nStability ? nStability+' note'+(nStability===1?'':'s') : 'No data'}</span></summary>
      <div class="acc-body">${nStability ? bulletList(out.employmentStabilityNotes) : '<div class="chart-empty">Nothing in the scorecards/notes speaks to job tenure or stability for this candidate.</div>'}</div>
    </details>

    <details class="accordion">
      <summary><span class="chev">▶</span> Evidence Timeline <span class="acc-teaser">${nStages} stage${nStages===1?'':'s'}</span></summary>
      <div class="acc-body">${timeline(out?out.evidenceTimeline:null)}</div>
    </details>

    <div class="card">
      <div class="sec-title">Open Questions for Jess</div>
      ${questionList(out?out.openQuestions:null)}
    </div>

    <div class="card">
      <div class="sec-title">Final Recommendation<button class="regen-btn" id="regenBtn" onclick="regenerate()"><i class="ti ti-refresh"></i>Regenerate</button></div>
      ${out ? `<div class="rec-final ${rec}">
        <div class="rf-txt"><div class="rf-title">${recLabel(rec)}</div>${esc(out.finalRecommendationReasoning)}</div>
      </div>` : '<div class="chart-empty">Not available yet.</div>'}
    </div>

    <div class="card">
      <div class="sec-title">Per-stage evaluations (raw)</div>
      ${stageEvaluationsCard(DETAIL.stageEvaluations)}
    </div>
  `;
}

function pick(id){ selectedId=id; renderList(); }

async function loadList(){
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('main').innerHTML=`<div class="center-state"><div class="spinner"></div>
    <h2>Loading candidates…</h2><p>Pulling tracked candidates from the evaluation engine.</p></div>`;
  try{
    const res=await fetch(API);
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||('HTTP '+res.status));
    LIST=data.candidates||[];
    renderList();
  }catch(e){
    document.getElementById('main').innerHTML=`<div class="center-state"><div class="ico"><i class="ti ti-alert-triangle"></i></div>
      <h2>Couldn't load</h2><p>${esc(e.message)}</p>
      <button class="retry" onclick="loadList()">Retry</button></div>`;
  }finally{
    btn.classList.remove('spinning');
  }
}

async function loadDetail(id){
  try{
    const res=await fetch(API+'?id='+encodeURIComponent(id));
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||('HTTP '+res.status));
    DETAIL=data;
    renderDetail();
  }catch(e){
    const pane=document.getElementById('detailPane');
    if(pane) pane.innerHTML=`<div class="center-state"><div class="ico"><i class="ti ti-alert-triangle"></i></div><h2>Couldn't load candidate</h2><p>${esc(e.message)}</p></div>`;
  }
}

async function regenerate(){
  const btn=document.getElementById('regenBtn');
  if(!btn||!selectedId) return;
  btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2 spinning"></i>Regenerating…';
  try{
    const res=await fetch(API+'?id='+encodeURIComponent(selectedId)+'&action=regenerate',{method:'POST'});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||('HTTP '+res.status));
    alert('Regeneration started. It runs as a background Workflow — refresh in a minute to see updated results.');
  }catch(e){
    alert('Could not start regeneration: '+e.message);
  }finally{
    btn.disabled=false; btn.innerHTML='<i class="ti ti-refresh"></i>Regenerate';
  }
}

loadList();
</script>
</body>
</html>
